services:
  # ─── PostgreSQL Database ──────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: authplatform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: authplatform
      POSTGRES_PASSWORD: authplatform_secret
      POSTGRES_DB: authplatform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authplatform -d authplatform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Database Init (migrations + seed) ────────────────────────
  # Runs once to apply migrations and seed data, then exits.
  # Uses the "init" Dockerfile stage which has full node_modules (including tsx).
  init:
    build:
      context: .
      dockerfile: Dockerfile
      target: init
    container_name: authplatform-init
    environment:
      DATABASE_URL: postgresql://authplatform:authplatform_secret@postgres:5432/authplatform
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx tsx prisma/seed.ts
      "

  # ─── Next.js Application ─────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: authplatform-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://authplatform:authplatform_secret@postgres:5432/authplatform
      AUTH_SECRET: ${AUTH_SECRET:-change-me-to-a-strong-random-secret-in-production}
      NEXT_PUBLIC_APP_NAME: AuthPlatform
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-your-cloud-name}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-your-api-key}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-your-api-secret}
      NODE_ENV: production
    depends_on:
      init:
        condition: service_completed_successfully

volumes:
  postgres_data:
    driver: local